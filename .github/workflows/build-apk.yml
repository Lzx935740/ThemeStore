name: 自动编译 Debug APK
on:
  # 1. 当你往 main 分支推送代码时，自动编译
  push:
    branches: [ main ]
  # 2. 允许你在 Actions 页面手动点击按钮编译
  workflow_dispatch:

jobs:
  build:
    # 使用最新的 Ubuntu 系统作为编译环境
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你仓库里的代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置 Java 环境 (JDK 17 是目前 Android 开发的标配)
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # 开启缓存，第二次编译会快很多

      # 3. 给编译脚本执行权限 (Linux 系统必须)
      - name: 授权 Gradlew
        run: chmod +x gradlew

      # 4. 执行编译命令 (核心步骤)
      - name: 开始编译 Debug 包
        run: ./gradlew assembleDebug --stacktrace
        # --stacktrace 的作用是：如果编译失败，会打印详细的错误日志，方便排查

      # 5. 将编译好的 APK 上传到 Actions 页面供你下载
      - name: 上传 APK 成品
        uses: actions/upload-artifact@v4
        with:
          name: ThemeStore-Debug-APK # 下载下来的压缩包名字
          path: app/build/outputs/apk/debug/*.apk # APK 在服务器上的默认路径
